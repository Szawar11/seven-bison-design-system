<body>
  <div class="sb-bg-washes" aria-hidden="true"></div>
  <div class="sb-progress" aria-hidden="true"></div>
  <div id="app"></div>
  <div class="sb-cursor" aria-hidden="true"><span class="ring"></span><span class="dot"></span></div>
  <div class="sb-grain" aria-hidden="true"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@0.525.0/dist/umd/lucide.min.js" crossorigin="anonymous"></script>

  <script type="text/babel" src="components/atoms.jsx"></script>
  <script type="text/babel" src="components/Header.jsx"></script>
  <script type="text/babel" src="components/Footer.jsx"></script>
  <script type="text/babel" src="components/Home.jsx"></script>
  <script type="text/babel" src="components/Sector.jsx"></script>
  <script type="text/babel" src="components/Portfolio.jsx"></script>
  <script type="text/babel" src="components/CaseStudy.jsx"></script>
  <script type="text/babel" src="components/StudioAccess.jsx"></script>
  <script type="text/babel" src="components/About.jsx"></script>
  <script type="text/babel" src="components/Contact.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const [page, setPage] = useState("home");

      const SECTORS = { tech: true, industry: true, health: true };

      // Header is Light by default; Dark for portfolio + case study which
      // open with a Dark hero (per DESIGN.md mode-selection table).
      const darkHeader = page === "portfolio" || page === "case";

      const navigate = (p) => {
        const go = () => { setPage(p); window.scrollTo(0, 0); };
        // Native cross-fade between pages (brand motion §6) where supported
        if (document.startViewTransition) document.startViewTransition(go);
        else go();
      };

      let Body = Home;
      if (SECTORS[page])             Body = Sector;
      else if (page === "portfolio") Body = Portfolio;
      else if (page === "case")      Body = CaseStudy;
      else if (page === "studio")    Body = StudioAccess;
      else if (page === "about")     Body = About;
      else if (page === "contact")   Body = Contact;

      const sectorKey = SECTORS[page] ? page : undefined;

      return (
        <React.Fragment>
          <Header current={page} navigate={navigate} dark={darkHeader}/>
          <Body navigate={navigate} sector={sectorKey}/>
          <Footer navigate={navigate}/>
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
  </script>

  <script>
  (function () {
    /* ── 1. SCROLL ENTRANCE ANIMATIONS ─────────────────────── */
    var ANIM_SELS = [
      '.sb-eyebrow-row',
      '.sb-card', '.sb-step', '.sb-work', '.sb-trust .logo',
      '.sb-results .r', '.sb-quote', '.sb-quote-attr',
      '.sb-cs-body p', '.sb-cs-body h3',
    ];

    var io = new IntersectionObserver(function (entries) {
      entries.forEach(function (e) {
        if (!e.isIntersecting) return;
        e.target.classList.add('is-visible');
        io.unobserve(e.target);
      });
    }, { threshold: 0.08, rootMargin: '0px 0px -48px 0px' });

    var seen = new WeakSet();
    function initAnims() {
      ANIM_SELS.forEach(function (sel) {
        document.querySelectorAll(sel).forEach(function (el) {
          if (seen.has(el)) return;
          /* Hero children get their own CSS load reveal — skip here */
          if (el.closest('.sb-hero-left, .sb-hero-right')) return;
          seen.add(el);
          var siblings = Array.from(el.parentElement.children).filter(function (c) {
            return c !== el && ANIM_SELS.some(function (s) { try { return c.matches(s); } catch(e){ return false; } });
          });
          var idx = Array.from(el.parentElement.children).indexOf(el);
          el.style.transitionDelay = Math.min(idx * 65, 350) + 'ms';
          el.classList.add('anim-ready');
          io.observe(el);
        });
      });
    }

    /* ── 2. CURSOR SPOTLIGHT on reels ──────────────────────── */
    function updateSpotlight(e) {
      document.querySelectorAll('.sb-reel, .sb-media').forEach(function (el) {
        var r = el.getBoundingClientRect();
        el.style.setProperty('--mouse-x', ((e.clientX - r.left) / r.width * 100).toFixed(1) + '%');
        el.style.setProperty('--mouse-y', ((e.clientY - r.top) / r.height * 100).toFixed(1) + '%');
      });
    }

    /* ── 3. 2.5D TILT on cards & reels ─────────────────────── */
    var TILT_SEL = '.sb-reel, .sb-media, .sb-sector-card, .sb-step, .sb-card';
    function onTiltMove(e) {
      var el = e.target.closest(TILT_SEL);
      if (!el) return;
      var r = el.getBoundingClientRect();
      var cx = ((e.clientX - r.left) / r.width - 0.5) * 2;
      var cy = ((e.clientY - r.top) / r.height - 0.5) * 2;
      el.style.transition = 'transform 80ms linear';
      el.style.transform = 'perspective(700px) rotateX(' + (-cy * 3.5) + 'deg) rotateY(' + (cx * 3.5) + 'deg) scale(1.01)';
    }
    function onTiltLeave(e) {
      var el = e.target.closest(TILT_SEL);
      if (!el) return;
      el.style.transition = 'transform 500ms var(--ease-standard)';
      el.style.transform = '';
    }

    /* ── 4. HERO PARALLAX + SCROLL PROGRESS ─────────────────── */
    var hasScrollTimeline = window.CSS && CSS.supports && CSS.supports('animation-timeline: scroll()');
    var progressEl = document.querySelector('.sb-progress');
    var rafId;
    function onScroll() {
      cancelAnimationFrame(rafId);
      rafId = requestAnimationFrame(function () {
        var y = window.scrollY;
        var hero = document.querySelector('.sb-hero-right .sb-reel');
        if (hero && window.innerWidth > 900) {
          hero.style.transform = 'translateY(' + (y * 0.09).toFixed(1) + 'px)';
        }
        /* Progress bar fallback when CSS scroll-timeline is unavailable */
        if (progressEl && !hasScrollTimeline) {
          var max = document.documentElement.scrollHeight - window.innerHeight;
          progressEl.style.setProperty('--progress', max > 0 ? (y / max).toFixed(4) : 0);
        }

        /* #8 Horizontal pinned filmstrip — vertical scroll → horizontal pan */
        var pin = document.querySelector('.sb-pin');
        if (pin && window.innerWidth > 900) {
          var track = pin.querySelector('.sb-pin-track');
          var pr = pin.getBoundingClientRect();
          var ptot = pin.offsetHeight - window.innerHeight;
          var pp = Math.min(Math.max(-pr.top / (ptot || 1), 0), 1);
          var maxX = track.scrollWidth - track.parentElement.clientWidth;
          if (maxX > 0) track.style.transform = 'translateX(' + (-pp * maxX).toFixed(1) + 'px)';
        }

        /* #10 Scroll-scrubbed pipeline — cross-fade stages + caption */
        var scrub = document.querySelector('.sb-scrub');
        if (scrub) {
          var sr = scrub.getBoundingClientRect();
          var stot = scrub.offsetHeight - window.innerHeight;
          var sp = Math.min(Math.max(-sr.top / (stot || 1), 0), 1);
          var stages = scrub.querySelectorAll('.sb-scrub-stage');
          var n = stages.length, af = sp * (n - 1), active = Math.round(af);
          stages.forEach(function (st, i) {
            st.style.opacity = Math.max(0, 1 - Math.abs(i - af)).toFixed(3);
          });
          scrub.querySelectorAll('.sb-scrub-steps li').forEach(function (li, i) {
            li.classList.toggle('active', i === active);
          });
          var act = stages[active];
          if (act) {
            var tEl = scrub.querySelector('.sb-scrub-title'), dEl = scrub.querySelector('.sb-scrub-desc');
            if (tEl) tEl.textContent = act.getAttribute('data-title');
            if (dEl) dEl.textContent = act.getAttribute('data-desc');
          }
        }
      });
    }

    /* ── 5. COUNT-UP on [data-count] stats ──────────────────── */
    var countIO = new IntersectionObserver(function (entries) {
      entries.forEach(function (e) {
        if (!e.isIntersecting) return;
        countIO.unobserve(e.target);
        var el = e.target, raw = el.getAttribute('data-count');
        var dec = (raw.split('.')[1] || '').length, target = parseFloat(raw);
        var dur = 1100, t0 = performance.now();
        (function tick(now) {
          var p = Math.min((now - t0) / dur, 1);
          var eased = 1 - Math.pow(1 - p, 3);
          el.textContent = (target * eased).toFixed(dec);
          if (p < 1) requestAnimationFrame(tick);
          else el.textContent = target.toFixed(dec);
        })(t0);
      });
    }, { threshold: 0.6 });
    function initCounts() {
      document.querySelectorAll('[data-count]').forEach(function (el) {
        if (el._cnt) return; el._cnt = true; countIO.observe(el);
      });
    }

    /* ── 6b. VARIABLE-WEIGHT MORPH on section headings ──────── */
    var morphIO = new IntersectionObserver(function (entries) {
      entries.forEach(function (e) {
        if (!e.isIntersecting) return;
        e.target.classList.add('wght-in');
        morphIO.unobserve(e.target);
      });
    }, { threshold: 0.35 });
    function initMorph() {
      document.querySelectorAll('h2.sb-h2').forEach(function (el) {
        if (el._wght) return; el._wght = true;
        el.classList.add('wght-morph');
        morphIO.observe(el);
      });
    }

    /* ── 6. MAGNETIC primary CTA ─────────────────────────────── */
    function initMagnetic() {
      document.querySelectorAll('.sb-btn--primary').forEach(function (btn) {
        if (btn._mag) return; btn._mag = true;
        btn.addEventListener('mousemove', function (e) {
          var r = btn.getBoundingClientRect();
          var mx = e.clientX - (r.left + r.width / 2);
          var my = e.clientY - (r.top + r.height / 2);
          btn.style.transform = 'translate(' + (mx * 0.25).toFixed(1) + 'px,' + (my * 0.4).toFixed(1) + 'px)';
        });
        btn.addEventListener('mouseleave', function () { btn.style.transform = ''; });
      });
    }

    /* ── 6c. CUSTOM CURSOR — dot + lagging ring, morphs on hover ─ */
    var finePointer = window.matchMedia('(hover: hover) and (pointer: fine)').matches;
    function initCursor() {
      var el = document.querySelector('.sb-cursor');
      var ring = el.querySelector('.ring'), dot = el.querySelector('.dot');
      var mx = innerWidth / 2, my = innerHeight / 2, rx = mx, ry = my, shown = false;
      document.body.classList.add('cursor-custom');
      addEventListener('mousemove', function (e) {
        mx = e.clientX; my = e.clientY;
        if (!shown) { shown = true; el.classList.add('on'); }
        dot.style.transform = 'translate(' + mx + 'px,' + my + 'px) translate(-50%,-50%)';
        var t = e.target.closest('.sb-reel, .sb-media') ? 'play'
              : e.target.closest('a, button, .sb-work, .sb-sector-card, [role="button"]') ? 'link' : '';
        ring.setAttribute('data-mode', t);
        ring.textContent = t === 'play' ? 'PLAY' : t === 'link' ? '→' : '';
      }, { passive: true });
      addEventListener('mouseleave', function () { el.classList.remove('on'); shown = false; });
      (function loop() {
        rx += (mx - rx) * 0.18; ry += (my - ry) * 0.18;
        ring.style.transform = 'translate(' + rx.toFixed(1) + 'px,' + ry.toFixed(1) + 'px) translate(-50%,-50%)';
        requestAnimationFrame(loop);
      })();
    }

    /* Respect the OS "reduce motion" setting — skip all JS motion */
    var REDUCE = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    /* ── BOOT: wait for React to paint ─────────────────────── */
    var timer = setInterval(function () {
      if (!document.querySelector('.sb-eyebrow-row')) return;
      clearInterval(timer);

      if (REDUCE) {
        /* Still run count-ups (informational, not motion sickness) */
        initCounts();
        new MutationObserver(function () { setTimeout(initCounts, 60); })
          .observe(document.getElementById('app'), { childList: true, subtree: true });
        return;
      }

      initAnims();
      initCounts();
      initMagnetic();
      initMorph();
      if (finePointer) initCursor();
      window.addEventListener('mousemove', onTiltMove,    { passive: true });
      window.addEventListener('mousemove', updateSpotlight, { passive: true });
      window.addEventListener('scroll',   onScroll,      { passive: true });
      document.addEventListener('mouseover', onTiltLeave, true);
      onScroll();

      /* Re-run animations on React page navigation */
      new MutationObserver(function (muts) {
        var changed = muts.some(function (m) { return m.addedNodes.length > 0; });
        if (changed) { seen = new WeakSet(); setTimeout(function () { initAnims(); initCounts(); initMagnetic(); initMorph(); }, 60); }
      }).observe(document.getElementById('app'), { childList: true, subtree: true });
    }, 80);
  })();
  </script>
