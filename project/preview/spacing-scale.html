<!doctype html><html><head><meta charset="utf-8"><title>Spacing Scale</title><link rel="stylesheet" href="_preview.css">
<style>
  .scale { display: flex; align-items: flex-end; gap: 8px; padding: 16px 0 8px; }
  .step { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .sq { background: var(--sb-graphite); }
  .px { font-family: var(--font-body); font-size: 10px; color: var(--text-tertiary); font-variant-numeric: tabular-nums; }
  .note { font-family: var(--font-body); font-size: 11px; color: var(--text-tertiary); margin-top: 10px; }
  .note b { color: var(--text-primary); font-weight: 600; }
</style></head>
<body><div class="card">
  <div class="section-row"><span class="idx">08</span><span class="label">Spacing · 8-point system</span><span class="rule"></span></div>
  <div class="scale">
    <div class="step"><div class="sq" style="width:4px;height:4px"></div><div class="px">4</div></div>
    <div class="step"><div class="sq" style="width:8px;height:8px"></div><div class="px">8</div></div>
    <div class="step"><div class="sq" style="width:12px;height:12px"></div><div class="px">12</div></div>
    <div class="step"><div class="sq" style="width:16px;height:16px"></div><div class="px">16</div></div>
    <div class="step"><div class="sq" style="width:24px;height:24px"></div><div class="px">24</div></div>
    <div class="step"><div class="sq" style="width:32px;height:32px"></div><div class="px">32</div></div>
    <div class="step"><div class="sq" style="width:40px;height:40px"></div><div class="px">40</div></div>
    <div class="step"><div class="sq" style="width:48px;height:48px"></div><div class="px">48</div></div>
    <div class="step"><div class="sq" style="width:64px;height:64px"></div><div class="px">64</div></div>
    <div class="step"><div class="sq" style="width:80px;height:80px"></div><div class="px">80</div></div>
    <div class="step"><div class="sq" style="width:96px;height:96px"></div><div class="px">96</div></div>
  </div>
  <p class="note"><b>Multiples of 4.</b> Tokens <code>--space-1</code> … <code>--space-12</code>. Section vertical rhythm sits in the 96–128 px range on desktop.</p>
</div></body></html>
