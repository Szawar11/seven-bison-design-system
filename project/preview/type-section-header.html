<!doctype html><html><head><meta charset="utf-8"><title>Section Header Pattern</title><link rel="stylesheet" href="_preview.css">
<style>
  .demo { padding: 28px 0; }
  .row { display: flex; align-items: center; gap: 16px; }
  .idxN { font-family: var(--font-body); font-weight: 600; font-size: 14px; color: var(--sb-pink); font-variant-numeric: tabular-nums; }
  .lbl { font-family: var(--font-display); font-weight: 600; font-size: 14px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--text-primary); }
  .rule { flex: 1; height: 1px; background: var(--border-hairline); }
  .head { font-family: var(--font-display); font-weight: 700; font-size: 38px; line-height: 1.1; letter-spacing: -0.01em; margin: 14px 0 0; }
  .head .pk { color: var(--sb-pink); }
  .note { margin-top: 14px; font-family: var(--font-body); font-size: 11px; color: var(--text-tertiary); }
</style></head>
<body><div class="card">
  <div class="demo">
    <div class="row"><span class="idxN">01</span><span class="lbl">Sector Expertise</span><span class="rule"></span></div>
    <h2 class="head">Deep understanding of complex, regulated <span class="pk">and technical industries.</span></h2>
  </div>
  <div class="note">Pink index + UPPERCASE eyebrow + 1 px hairline rule. This is the brand signature — reuse it on every section header.</div>
</div></body></html>
