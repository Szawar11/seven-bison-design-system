<!doctype html><html><head><meta charset="utf-8"><title>Palette — Neutrals</title><link rel="stylesheet" href="_preview.css">
<style>
  .row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 0; }
  .sw { height: 100px; padding: 10px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: flex-end; border-right: 1px solid rgba(0,0,0,0.06); }
  .sw:last-child { border-right: 0; }
  .sw .n { font-family: var(--font-display); font-weight: 600; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; }
  .sw .h { font-family: var(--font-body); font-size: 10px; font-variant-numeric: tabular-nums; }
  .dark-on { color: #111; }
  .light-on { color: #fff; }
  .b { background: var(--surface-canvas); padding: 14px 12px; font-family: var(--font-body); font-size: 11px; color: var(--text-tertiary); display: flex; justify-content: space-between; }
  .b b { color: var(--text-primary); font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; font-family: var(--font-display); font-size: 11px; }
</style></head>
<body><div class="card">
  <div class="section-row"><span class="idx">02</span><span class="label">Neutrals</span><span class="rule"></span></div>
  <div style="margin-top:16px">
    <div class="b"><b>Light scale</b><span>off-white → ink black</span></div>
    <div class="row">
      <div class="sw dark-on" style="background:#F7F5F2"><div class="n">Off White</div><div class="h">#F7F5F2</div></div>
      <div class="sw dark-on" style="background:#E8E8E8"><div class="n">Soft Gray</div><div class="h">#E8E8E8</div></div>
      <div class="sw dark-on" style="background:#8A8A8A"><div class="n">Medium</div><div class="h">#8A8A8A</div></div>
      <div class="sw light-on" style="background:#2A2A2A"><div class="n">Graphite</div><div class="h">#2A2A2A</div></div>
      <div class="sw light-on" style="background:#111111"><div class="n">Ink Black</div><div class="h">#111111</div></div>
      <div class="sw light-on" style="background:#000000"><div class="n">True Black</div><div class="h">#000000</div></div>
      <div class="sw dark-on" style="background:#FFFFFF; border:1px solid #E8E8E8"><div class="n">White</div><div class="h">#FFFFFF</div></div>
    </div>
  </div>
</div></body></html>
