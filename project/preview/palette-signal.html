<!doctype html><html><head><meta charset="utf-8"><title>Palette — Signal</title><link rel="stylesheet" href="_preview.css">
<style>
  .row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0; }
  .sw { height: 110px; padding: 14px; box-sizing: border-box; color: #fff; display: flex; flex-direction: column; justify-content: flex-end; }
  .sw .n { font-family: var(--font-display); font-weight: 600; font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; }
  .sw .h { font-family: var(--font-body); font-size: 11px; opacity: 0.85; font-variant-numeric: tabular-nums; }
  .note { font-family: var(--font-body); font-size: 12px; color: var(--text-tertiary); margin-top: 14px; line-height: 18px; }
  .note b { color: var(--text-primary); font-weight: 600; }
</style></head>
<body><div class="card">
  <div class="section-row"><span class="idx">01</span><span class="label">Signal · Seven Bison Pink</span><span class="rule"></span></div>
  <div class="row" style="margin-top:16px">
    <div class="sw" style="background:#E80787"><div class="n">Pink</div><div class="h">#E80787 · default</div></div>
    <div class="sw" style="background:#C0066F"><div class="n">Pink · Hover</div><div class="h">#C0066F</div></div>
    <div class="sw" style="background:#9A0558"><div class="n">Pink · Press</div><div class="h">#9A0558</div></div>
  </div>
  <p class="note"><b>Pink is signal, not surface.</b> ~10% of pixels per layout in Light Mode; about half that in Dark. Reserved for indices, CTAs, icon strokes, focus rings, hover marks.</p>
</div></body></html>
