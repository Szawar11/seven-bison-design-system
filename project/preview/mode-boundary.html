<!doctype html><html><head><meta charset="utf-8"><title>Mode Boundary</title><link rel="stylesheet" href="_preview.css">
<style>
  .frame { position: relative; height: 240px; display: grid; grid-template-columns: 1fr 1fr; }
  .frame .l { background: var(--sb-off-white); padding: 28px; }
  .frame .d { background: var(--sb-true-black); padding: 28px; color: #FFFFFF; }
  .frame h3 { font-family: var(--font-display); font-weight: 700; font-size: 22px; line-height: 1.15; margin: 0 0 8px; letter-spacing: -0.01em; }
  .frame .eb { font-family: var(--font-display); font-weight: 600; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 12px; }
  .frame .l .eb { color: var(--sb-pink); }
  .frame .d .eb { color: var(--sb-pink); }
  .frame .d h3 { color: #FFFFFF; }
  .frame .l p, .frame .d p { font-family: var(--font-body); font-size: 12px; line-height: 18px; margin: 0; }
  .frame .l p { color: var(--text-secondary); }
  .frame .d p { color: #D9D9D9; }
  .note { padding: 14px 32px; font-family: var(--font-body); font-size: 12px; color: var(--text-tertiary); border-top: 1px solid var(--border-hairline); }
</style></head>
<body><div class="card" style="padding:0">
  <div class="frame">
    <div class="l">
      <div class="eb">01 / Light · Default</div>
      <h3>Page chrome,<br>body, decks.</h3>
      <p>Off-white canvas. Black ink. Pink as signal.</p>
    </div>
    <div class="d">
      <div class="eb">02 / Dark · Cinematic</div>
      <h3>Reels, hero,<br>case studies.</h3>
      <p>True black. White ink. Pink as accent — half the dose.</p>
    </div>
  </div>
  <div class="note">The boundary between modes is a clean rectangular edge. Never a fade, gradient, or vignette.</div>
</div></body></html>
